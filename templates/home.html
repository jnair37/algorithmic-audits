<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interface Demo v2</title>
  <style>
    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      background-color: #f8fafc;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #1e293b;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 2.5rem 3rem;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 500px;
    }
    h1 {
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
      color: #0f172a;
    }
    p {
      margin: 0.4rem 0;
      font-size: 1rem;
      color: #475569;
    }
    ul {
      list-style: none;
      padding: 0;
      margin-top: 1.5rem;
    }
    li {
      margin: 0.8rem 0;
    }
    a {
      text-decoration: none;
      background-color: #2563eb;
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      transition: background-color 0.2s ease;
      font-weight: 500;
    }
    a:hover {
      background-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Interface Demo v2</h1>
    <p><strong>Model:</strong> CLIP w/ ViT/B-32</p>
    <p><strong>Task:</strong> Bird Classification</p>
    <p><strong>Input:</strong> American Egret</p>

    <ul>
      <li><a href="/outputmaps">View Output Attention Maps</a></li>
      <li><a href="/layerwisemaps">View Layer-based Attention Maps</a></li>
    </ul>
  </div>
</body>
</html>
